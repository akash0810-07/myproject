{% extends 'base.html' %}

{% block body %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-danger shadow-sm">
                <div class="card-body">
                    <h2 class="card-title text-danger mb-3">Delete Member</h2>
                    <p>Are you sure you want to delete <strong>{{ member.fname }} {{ member.lname }}</strong>?</p>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
